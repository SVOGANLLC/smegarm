services:
  web:
    build:
      context: .
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY}
        VITE_SUPABASE_PROJECT_ID: ${VITE_SUPABASE_PROJECT_ID}
        VITE_ANALYTICS_ENABLED: ${VITE_ANALYTICS_ENABLED:-false}
        VITE_FUZZY_SEARCH_ENABLED: ${VITE_FUZZY_SEARCH_ENABLED:-false}
    image: smeg-armenia:latest
    container_name: smeg-armenia
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 3000
      # SSR talks to Supabase API on the shared Docker network.
      SUPABASE_URL: http://smeg-api:8000
    ports:
      - "127.0.0.1:3000:3000"
    extra_hosts:
      # Some Reg.ru VPS routes block default Telegram DC IPs; this one is reachable.
      - "api.telegram.org:149.154.167.220"
    networks:
      - default
      - supabase

networks:
  supabase:
    external: true
    name: supabase_default
