name: Sync to client repo

on:
  push:
    branches: [main]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to SVOGANLLC/smegarm
        env:
          CLIENT_TOKEN: ${{ secrets.CLIENT_GITHUB_TOKEN }}
        run: |
          if [ -z "$CLIENT_TOKEN" ]; then
            echo "Missing CLIENT_GITHUB_TOKEN secret"
            exit 1
          fi
          git remote remove client 2>/dev/null || true
          git remote add client "https://x-access-token:${CLIENT_TOKEN}@github.com/SVOGANLLC/smegarm.git"
          git push client HEAD:main --force
